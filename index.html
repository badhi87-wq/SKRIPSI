<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracking Motor Listrik</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
        }

        #map {
            height: 78vh;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        .card-header {
            font-weight: bold;
            background-color: #ffffff;
            border-radius: 15px 15px 0 0 !important;
        }

        .table td {
            font-size: 15px;
            padding: 9px;
        }

        .navbar-brand {
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Monitoring Motor Listrik</a>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-lg-8 mb-3">
            <div id="map"></div>
        </div>

        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <h5>Last Data Received</h5>
                </div>

                <div class="card-body">
                    <table class="table table-borderless">
                        <tbody>
                            <tr><td>Date</td><td>: <span id="time_date"></span></td></tr>
                            <tr><td>Time</td><td>: <span id="time_time"></span></td></tr>
                            <tr><td>Latitude</td><td>: <span id="latitude"></span></td></tr>
                            <tr><td>Longitude</td><td>: <span id="longitude"></span></td></tr>
                            <tr><td>Speed</td><td>: <span id="speed"></span> km/h</td></tr>
                            <tr><td>Battery</td><td>: <span id="battery"></span> %</td></tr>
                            <tr><td>Voltage</td><td>: <span id="voltage"></span> V</td></tr>
                            <tr><td>Current</td><td>: <span id="current"></span> A</td></tr>
                            <tr><td>Power</td><td>: <span id="power"></span> W</td></tr>
                            <tr><td>Relay Command</td><td>: <span id="relay"></span></td></tr>
                        </tbody>
                    </table>

                    <button id="startPolylineButton" class="btn btn-success w-100 mb-2">Start Tracking</button>
                    <button id="resetButton" class="btn btn-primary w-100 mb-2" style="display:none;">Reset</button>

                    <button id="shutdownButton" class="btn btn-danger w-100 mb-2">ShutDown Molist</button>
                    <button id="enableButton" class="btn btn-warning w-100">Enable Molist</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

<script>
    // =========================
    // CHANNEL MONITORING
    // =========================
    var MONITORING_CHANNEL_ID = "3408750";
    var MONITORING_READ_API_KEY = "XR2A76F1P4D7IYVO";

    // =========================
    // CHANNEL COMMAND RELAY
    // =========================
    var COMMAND_CHANNEL_ID = "3416849";
    var COMMAND_WRITE_API_KEY = "SN0KTTXJDJ1688IF";

    // =========================
    // MAP
    // =========================
    var map = L.map('map').setView([-7.128320, 112.725380], 17);

    var osm = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '© OpenStreetMap contributors'
        }
    );

    var satellite = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
            attribution: 'Tiles © Esri'
        }
    );

    var labels = L.tileLayer(
        'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
        {
            attribution: 'Labels © Esri'
        }
    );

    var hybrid = L.layerGroup([satellite, labels]);

    osm.addTo(map);

    L.control.layers({
        "Map": osm,
        "Satellite": satellite,
        "Hybrid": hybrid
    }).addTo(map);

    // =========================
    // ICON MARKER
    // =========================
    var redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    var blueIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    var greenIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    var initialMarker = L.marker([0, 0], { icon: redIcon });
    var updatedMarker = L.marker([0, 0], { icon: blueIcon });
    var finishMarker = L.marker([0, 0], { icon: greenIcon });

    var polyline = L.polyline([], { color: 'blue', weight: 5 });
    var stat_btn = 0;

    var startPolylineButton = document.getElementById('startPolylineButton');
    var resetButton = document.getElementById('resetButton');

    // =========================
    // UPDATE MAP
    // =========================
    function updateMap(data) {
        var latitude  = parseFloat(data.field1);
        var longitude = parseFloat(data.field2);
        var speed     = parseFloat(data.field3);
        var battery   = parseFloat(data.field4);
        var voltage   = parseFloat(data.field5);
        var current   = parseFloat(data.field6);
        var power     = parseFloat(data.field7);
        var timestamp = data.created_at;

        if (isNaN(latitude)) latitude = 0;
        if (isNaN(longitude)) longitude = 0;
        if (isNaN(speed)) speed = 0;
        if (isNaN(battery)) battery = 0;
        if (isNaN(voltage)) voltage = 0;
        if (isNaN(current)) current = 0;
        if (isNaN(power)) power = 0;

        var date_now = "-";
        var time_now = "-";

        if (timestamp) {
            date_now = timestamp.split('T')[0];
            time_now = timestamp.split('T')[1].split('+')[0];
        }

        document.getElementById('latitude').textContent = latitude.toFixed(6);
        document.getElementById('longitude').textContent = longitude.toFixed(6);
        document.getElementById('time_date').textContent = date_now;
        document.getElementById('time_time').textContent = time_now;
        document.getElementById('speed').textContent = speed.toFixed(1);
        document.getElementById('battery').textContent = battery.toFixed(0);
        document.getElementById('voltage').textContent = voltage.toFixed(1);
        document.getElementById('current').textContent = current.toFixed(1);
        document.getElementById('power').textContent = power.toFixed(0);

        updateMarker(speed, battery, voltage, current, power, latitude, longitude, date_now, time_now);

        if (stat_btn == 1) {
            polyline.addLatLng([latitude, longitude]);
            polyline.addTo(map);
        }

        if (latitude != 0 && longitude != 0) {
            map.panTo([latitude, longitude]);
        }
    }

    function updateMarker(speed, battery, voltage, current, power, latitude, longitude, date_now, time_now) {
        var popup =
            "<b>Data Motor Listrik</b><br>" +
            date_now + " " + time_now + "<br>" +
            "Speed: " + speed.toFixed(1) + " km/h<br>" +
            "Battery: " + battery.toFixed(0) + " %<br>" +
            "Voltage: " + voltage.toFixed(1) + " V<br>" +
            "Current: " + current.toFixed(1) + " A<br>" +
            "Power: " + power.toFixed(0) + " W<br>";

        var marker;

        if (stat_btn == 0) marker = initialMarker.addTo(map);
        if (stat_btn == 1) marker = updatedMarker.addTo(map);
        if (stat_btn == 2) marker = finishMarker.addTo(map);

        marker.setLatLng([latitude, longitude]).update();
        marker.bindPopup(popup);
    }

    // =========================
    // TRACKING
    // =========================
    function startPolyline() {
        if (stat_btn == 0) {
            stat_btn = 1;
            startPolylineButton.textContent = "Stop";
            startPolylineButton.classList.remove("btn-success");
            startPolylineButton.classList.add("btn-danger");
            resetButton.style.display = "none";
        } else if (stat_btn == 1) {
            stat_btn = 2;
            startPolylineButton.textContent = "Start Tracking";
            startPolylineButton.classList.remove("btn-danger");
            startPolylineButton.classList.add("btn-success");
            startPolylineButton.disabled = true;
            resetButton.style.display = "block";
        }
    }

    function resetMap() {
        stat_btn = 0;

        if (initialMarker) map.removeLayer(initialMarker);
        if (updatedMarker) map.removeLayer(updatedMarker);
        if (finishMarker) map.removeLayer(finishMarker);
        if (polyline) map.removeLayer(polyline);

        initialMarker = L.marker([0, 0], { icon: redIcon });
        updatedMarker = L.marker([0, 0], { icon: blueIcon });
        finishMarker = L.marker([0, 0], { icon: greenIcon });
        polyline = L.polyline([], { color: 'blue', weight: 5 });

        startPolylineButton.disabled = false;
        startPolylineButton.textContent = "Start Tracking";
        startPolylineButton.classList.remove("btn-danger");
        startPolylineButton.classList.add("btn-success");
        resetButton.style.display = "none";

        fetchData();
    }

    // =========================
    // FETCH MONITORING DATA
    // =========================
    function fetchData() {
        fetch('https://api.thingspeak.com/channels/' + MONITORING_CHANNEL_ID + '/feeds/last.json?timezone=Asia%2FJakarta&api_key=' + MONITORING_READ_API_KEY)
            .then(response => response.json())
            .then(data => updateMap(data))
            .catch(error => console.error('Error fetching data:', error));
    }

    // =========================
    // SEND RELAY COMMAND
    // =========================
    function sendRelayCommand(commandValue, messageSuccess) {
        fetch("https://api.thingspeak.com/update?api_key=" + COMMAND_WRITE_API_KEY + "&field1=" + commandValue)
            .then(response => response.text())
            .then(data => {
                if (data == "0") {
                    alert("ThingSpeak membatasi update command. Tunggu 15 detik lalu coba lagi.");
                } else {
                    alert(messageSuccess);
                    document.getElementById('relay').textContent = commandValue == 1 ? "ON / Kontak Aktif" : "OFF / Kontak Mati";
                }
            })
            .catch(error => alert("Gagal mengirim command ke ThingSpeak."));
    }

    function shutdownMolist() {
        if (confirm("Yakin ingin mematikan kontak motor listrik?")) {
            sendRelayCommand(0, "Command ShutDown berhasil dikirim.");
        }
    }

    function enableMolist() {
        if (confirm("Aktifkan kembali kontak motor listrik?")) {
            sendRelayCommand(1, "Command Enable berhasil dikirim.");
        }
    }

    // =========================
    // EVENT
    // =========================
    setInterval(fetchData, 5000);
    fetchData();

    startPolylineButton.addEventListener('click', startPolyline);
    resetButton.addEventListener('click', resetMap);
    document.getElementById('shutdownButton').addEventListener('click', shutdownMolist);
    document.getElementById('enableButton').addEventListener('click', enableMolist);
</script>

</body>
</html>
